<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAUGHT4K — your week, itemised</title>
<link rel="stylesheet" href="shared/theme.css">
</head>
<body>

<div class="stage">
  <div style="text-align:center;margin-bottom:14px">
    <span class="chip" id="weekChip">LOADING…</span>
  </div>

  <!-- drop banner (shown only when a drop is live) -->
  <div id="dropBanner" class="hidden" style="margin-bottom:14px;text-align:center">
    <span class="chip chip-hot" id="dropName"></span>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button class="btn btn-primary" id="useDrop" style="font-size:13.5px;padding:11px">Take the limited audit</button>
      <button class="btn btn-ghost" id="useWeekly" style="font-size:13.5px;padding:11px">Regular weekly</button>
    </div>
  </div>

  <!-- STEP 1 -->
  <div class="panel" id="step1">
    <label>name on the report</label>
    <input type="text" id="nm" maxlength="18" placeholder="your name" autocomplete="off" style="margin-bottom:18px">
    <div id="qHost"></div>
    <button class="btn btn-primary" id="goBtn" disabled>file this week's report →</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden" style="display:flex;flex-direction:column;align-items:center">
    <div class="receipt" id="rcpt">
      <div class="rHead">
        <div class="big" id="rTitle">WEEKLY DAMAGE REPORT</div>
        <div class="sm" id="rSub"></div>
      </div>
      <div id="rItems"></div>
      <div class="sep"></div>
      <div class="total"><span>TOTAL DAMAGE</span><span id="rTotal"></span></div>
      <div class="verdict" id="rVerdict"></div>
      <div class="ribbon" id="nextWeek"></div>
      <div class="barcode"><div class="bars" id="rBars"></div></div>
      <div class="rFoot">FINDINGS ARE FINAL · APPEALS REJECTED</div>
      <div class="wm"><span id="wmText"></span></div>
    </div>

    <div style="width:100%;max-width:340px;margin-top:20px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-share" id="shareBtn">Send it to the gc<small>compare damage totals</small></button>
      <button class="btn btn-ghost" id="hdBtn">HD · no watermark<small>₹19 · UPI</small></button>
      <button class="btn btn-quiet" id="freeBtn">download free (watermarked)</button>
      <button class="btn btn-quiet" id="againBtn" style="opacity:.5">↻ redo (the receipt will know you lied)</button>
    </div>
  </div>

  <!-- DIARY -->
  <div id="diary" style="margin-top:34px">
    <label style="margin-bottom:10px">my receipts <span id="streak" style="color:var(--accent)"></span></label>
    <div class="trend hidden" id="trendBox"></div>
    <div id="diaryList"><div style="font-size:13px;opacity:.55">No receipts yet. File your first audit above — the diary lives on this device only.</div></div>
    <button class="btn btn-quiet hidden" id="exportBtn" style="margin-top:6px">⬇ export my receipts (JSON)</button>
  </div>
</div>

<script src="shared/common.js"></script>
<script>
injectChrome();

let CONTENT=null, PACK=null, PACK_NAME="WEEKLY DAMAGE REPORT", picks=[], drop=null;
const week=isoWeek();

(async function init(){
  CONTENT=await loadContent();
  document.getElementById("weekChip").textContent="WEEK "+week+" OF 52 · AUDIT OPEN";
  document.getElementById("wmText").textContent=CONFIG.domain;

  drop=activeDrop(CONTENT);
  if(drop){
    document.getElementById("dropBanner").classList.remove("hidden");
    document.getElementById("dropName").textContent=(drop.badge||"🔥 LIMITED")+" — "+drop.name;
  }
  useWeeklyPack();
})();

function useWeeklyPack(){
  const seasonal=seasonalPack(CONTENT,week);
  if(seasonal){PACK=seasonal.questions;PACK_NAME=seasonal.name;}
  else{PACK=pickWeekly(CONTENT.weekly_bank,week,5);PACK_NAME="WEEKLY DAMAGE REPORT";}
  renderQuestions();
}
document.getElementById("useWeekly").onclick=useWeeklyPack;
document.getElementById("useDrop").onclick=()=>{
  PACK=drop.questions;PACK_NAME=drop.name;renderQuestions();
  toast("Limited audit loaded. It expires — file it before it's gone.");
};

function renderQuestions(){
  picks=new Array(PACK.length).fill(null);
  const host=document.getElementById("qHost");host.innerHTML="";
  PACK.forEach((q,qi)=>{
    const div=document.createElement("div");div.className="q";
    div.innerHTML="<label>"+q.label+"</label>";
    const opts=document.createElement("div");opts.className="opts";
    q.options.forEach((o,oi)=>{
      const b=document.createElement("button");b.className="opt";b.textContent=o.text;
      b.onclick=()=>{
        opts.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel");picks[qi]=oi;checkReady();
      };
      opts.append(b);
    });
    div.append(opts);host.append(div);
  });
  checkReady();
}

const nm=document.getElementById("nm");
nm.addEventListener("input",checkReady);
function checkReady(){
  document.getElementById("goBtn").disabled=!(nm.value.trim().length>1&&picks.every(p=>p!==null));
}

document.getElementById("goBtn").onclick=()=>{
  const name=nm.value.trim().toUpperCase();
  const now=new Date(), from=new Date(now);from.setDate(now.getDate()-6);
  const fmt=d=>d.toLocaleDateString("en-IN",{day:"numeric",month:"short"});

  document.getElementById("rTitle").textContent=PACK_NAME;
  document.getElementById("rSub").textContent="SUBJECT: "+name+" · "+fmt(from)+" – "+fmt(now);

  let html="",total=0,items=[];
  PACK.forEach((q,qi)=>{
    const o=q.options[picks[qi]];total+=o.charge;
    items.push({item:o.item,charge:o.charge});
    html+='<div class="row"><span>'+o.item+'</span><span class="r">₹'+o.charge+"</span></div>";
  });
  const rec=name.length*8;total+=rec;
  html+='<div class="row"><span>"Starting Monday" fee (recurring)</span><span class="r">₹'+rec+"/wk</span></div>";

  document.getElementById("rItems").innerHTML=html;
  document.getElementById("rTotal").textContent="₹"+total;
  const verdict=CONTENT.verdicts[total%CONTENT.verdicts.length];
  document.getElementById("rVerdict").textContent=verdict;

  const daysToSun=(7-now.getDay())%7||7;
  const ns=new Date(now);ns.setDate(now.getDate()+daysToSun);
  document.getElementById("nextWeek").textContent="AUDIT REOPENS: SUNDAY "+
    ns.toLocaleDateString("en-IN",{day:"numeric",month:"short"}).toUpperCase();

  const bars=document.getElementById("rBars");bars.innerHTML="";
  for(let i=0;i<34;i++){const b=document.createElement("i");b.style.height=(9+((total*i*7)%23))+"px";bars.append(b);}

  saveToDiary({week,date:now.toISOString(),pack:PACK_NAME,total,verdict,items,name});

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
  window.scrollTo({top:0,behavior:"smooth"});
};

document.getElementById("againBtn").onclick=()=>{
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step1").classList.remove("hidden");
};
document.getElementById("shareBtn").onclick=()=>toast("Live version: native share sheet opens with the card attached (WhatsApp / Instagram).");
document.getElementById("hdBtn").onclick=()=>toast("Live version: Razorpay link → ₹19 UPI → clean HD card downloads.");
document.getElementById("freeBtn").onclick=()=>toast("Live version: saves the watermarked PNG, generated in the browser.");

/* ---------- diary (device-local only) ---------- */
const DKEY="c4k_diary";
function getDiary(){try{return JSON.parse(localStorage.getItem(DKEY)||"[]");}catch(e){return [];}}
function saveToDiary(entry){
  try{
    const d=getDiary();
    d.unshift(entry);
    localStorage.setItem(DKEY,JSON.stringify(d.slice(0,200)));
    renderDiary();
  }catch(e){/* storage unavailable (private mode etc.) — app still works */}
}
function renderDiary(){
  const d=getDiary();
  const list=document.getElementById("diaryList");
  const exportBtn=document.getElementById("exportBtn");
  if(!d.length)return;
  exportBtn.classList.remove("hidden");

  // streak: consecutive distinct weeks
  const weeks=[...new Set(d.map(e=>e.week))].sort((a,b)=>b-a);
  let streak=1;
  for(let i=0;i<weeks.length-1;i++){if(weeks[i]-weeks[i+1]===1)streak++;else break;}
  document.getElementById("streak").textContent=weeks.length>1?("· "+streak+"-week streak"):"";

  // trend roast: compare two most recent different entries
  if(d.length>=2){
    const diff=d[0].total-d[1].total;
    const tb=document.getElementById("trendBox");tb.classList.remove("hidden");
    tb.textContent=diff>0
      ? "📈 Damage up ₹"+diff+" from last audit. The receipt is disappointed but not surprised."
      : diff<0
      ? "📉 Damage down ₹"+(-diff)+". Who is she. Don't let it go to your head."
      : "↔ Exactly the same damage. Consistency is a personality, apparently.";
  }
  list.innerHTML=d.slice(0,12).map(e=>
    '<div class="diaryItem"><span>WK '+e.week+" · "+new Date(e.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})+
    '</span><span><b>₹'+e.total+"</b></span></div>").join("");
}
document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(getDiary(),null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="caught4k-receipts.json";a.click();
  toast("Exported. Keep it safe — the diary lives only on this device.");
};
renderDiary();
</script>
</body>
</html>
